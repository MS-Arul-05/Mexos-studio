# Reverse proxy for the Mexos Studio API on AWS — EC2 + Docker Compose variant.
#
#   Browser ── HTTPS ──▶ CloudFront (TLS ends here) ── HTTP ──▶ EC2 :80 (this nginx) ──▶ api:4000
#
# How this differs from deploy/nginx.conf (the self-hosted TLS variant):
#   • Port 80 only. CloudFront owns HTTPS (viewer-protocol-policy: redirect-to-https),
#     so there is no certbot/TLS material on the box. Keep ENFORCE_HTTPS=false and
#     TRUST_PROXY=true in the API's .env.
#   • Upstream is the compose service name "api" on the private Docker network,
#     not 127.0.0.1 on the host.
#   • X-Forwarded-Proto is hard-coded to "https": CloudFront forces every viewer
#     onto HTTPS before the request can reach us, but the CloudFront→origin hop
#     itself is plain HTTP — the app must see the ORIGINAL scheme. (CloudFront's
#     own header for this is CloudFront-Forwarded-Proto; we normalize it away.)
#   • Real viewer IPs are recovered from X-Forwarded-For (CloudFront appends the
#     true connecting IP), so per-IP rate limiting still works behind the CDN.
#
# Install — mount into the compose nginx service so it replaces the default site:
#   volumes:
#     - ./deploy/aws/nginx-aws.conf:/etc/nginx/conf.d/default.conf:ro
# Files in conf.d are included inside the http{} block, which is why the
# rate-limit zones and real-ip directives can sit at the top level here.

# ── Recover the real viewer IP ──
# CloudFront connects from its own edge IPs; the viewer's address arrives as the
# LAST entry of X-Forwarded-For (CloudFront always appends the connecting IP).
# real_ip_recursive off = take exactly that last entry, so a client can't dodge
# rate limits by forging its own X-Forwarded-For header.
# Trusting 0.0.0.0/0 is safe ONLY because the EC2 security group restricts port
# 80 to the CloudFront origin-facing managed prefix list
# (com.amazonaws.global.cloudfront.origin-facing) — nothing else can connect.
set_real_ip_from 0.0.0.0/0;
real_ip_header X-Forwarded-For;
real_ip_recursive off;

# ── Edge rate-limit zones (defense-in-depth on top of the app limiter) ──
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=conns:10m;

server {
    listen 80 default_server;
    server_name _;

    # Re-resolve the "api" service name through Docker's embedded DNS every 10s.
    # A static upstream{} block (as in deploy/nginx.conf) caches the container IP
    # at startup and serves 502s after `docker compose up -d` recreates the api
    # container with a new address — the variable form re-resolves per request.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $api_upstream http://api:4000;

    # Body size cap: matches the app's 1mb express.json limit + slack. Design
    # uploads go straight to S3 via presigned URLs and never pass through here.
    client_max_body_size 2m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 15s;

    # Connection ceiling per viewer IP.
    limit_conn conns 20;

    # Hide upstream server details.
    server_tokens off;
    proxy_hide_header X-Powered-By;

    # Compress JSON/text responses (payload size / latency). CloudFront passes
    # compressed responses through and respects the Vary header gzip_vary adds.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types application/json application/javascript text/plain text/css application/xml;
    gzip_vary on;

    # ── Origin health target for CloudFront / uptime checks ──
    # Answered by nginx itself: proves the box + proxy are up without touching
    # the app, and is never rate limited. `curl http://<ec2-ip>/nginx-health`
    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # The Prometheus scrape endpoint is token-guarded in the app, but it has no
    # business being reachable through CloudFront — hide it at the edge.
    location = /metrics {
        return 404;
    }

    # ── API ──
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Start "t=${msec}";

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Tighter limit on auth/OTP endpoints (credential-stuffing / brute-force).
    # Regex so it covers both the /api alias and the canonical /api/v1 path.
    location ~ ^/api(/v1)?/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Start "t=${msec}";
    }

    # Payment/WhatsApp webhooks must reach the app with the raw body intact
    # (signature verification) — never buffer/alter them.
    location ~ ^/api(/v1)?/(payments|whatsapp)/webhook$ {
        proxy_request_buffering off;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Start "t=${msec}";
    }

    # Health probes bypass rate limiting so monitor checks are never throttled.
    # Covers /api/health, /api/health/live, /api/health/ready and the /api/v1
    # equivalents (regex beats the /api/ prefix location above).
    location ~ ^/api(/v1)?/health(/live|/ready)?$ {
        access_log off;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Everything else is still handed to the app (its JSON 404 handler answers) —
    # the API is the only thing behind this origin, so there is nothing to serve
    # from nginx itself.
    location / {
        limit_req zone=api burst=40 nodelay;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Start "t=${msec}";

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
