# Hardened reverse proxy for the Custom T-Shirt API.
# Terminates TLS, enforces HTTPS + HSTS, caps request size, applies edge rate
# limiting, and forwards to the app on loopback. Pair with the app's own
# TRUST_PROXY=true / ENFORCE_HTTPS=true so req.ip and redirects are correct.

# ── Edge rate-limit zones (defense-in-depth on top of the app limiter) ──
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=conns:10m;

upstream tshirt_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

# Redirect all HTTP to HTTPS.
server {
    listen 80;
    server_name yourstore.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name yourstore.com;

    # ── TLS hardening (Mozilla "intermediate") ──
    ssl_certificate     /etc/letsencrypt/live/yourstore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourstore.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS (the app also sets this; belt-and-braces at the edge).
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains; preload" always;

    # Body size cap (matches the app's 1mb JSON limit + slack for uploads proxied elsewhere).
    client_max_body_size 2m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 15s;

    # Connection ceiling per IP.
    limit_conn conns 20;

    # Hide upstream server details.
    server_tokens off;
    proxy_hide_header X-Powered-By;

    # Compress JSON/text responses (payload size / latency).
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types application/json application/javascript text/plain text/css application/xml;
    gzip_vary on;

    # ── API ──
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass http://tshirt_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Tighter limit on auth/OTP endpoints (credential-stuffing / brute-force).
    # Regex so it covers both the /api alias and the canonical /api/v1 path.
    location ~ ^/api(/v1)?/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://tshirt_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Payment/WhatsApp webhooks must reach the app with the raw body intact
    # (signature verification) — never buffer/alter them.
    location ~ ^/api(/v1)?/(payments|whatsapp)/webhook$ {
        proxy_request_buffering off;
        proxy_pass http://tshirt_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health probes bypass rate limiting so LB checks are never throttled.
    location = /api/health/live     { proxy_pass http://tshirt_api; }
    location = /api/health/ready    { proxy_pass http://tshirt_api; }
    location = /api/v1/health/live  { proxy_pass http://tshirt_api; }
    location = /api/v1/health/ready { proxy_pass http://tshirt_api; }
}
